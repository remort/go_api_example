version: '3'

services:
  tests_db:
    image: postgres:latest
    env_file:
      - config.env.test
    command: "postgres -c max_connections=20 -c shared_buffers=200MB"
    volumes:
      - test-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usr -d web"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests
    depends_on:
      tests_db:
        condition: service_healthy
    env_file:
      - config.env.test

    volumes:
      - .:/app

volumes:
  test-postgres-data:
