version: '3'

services:
  db:
    image: postgres:latest
    env_file:
      - config.env
    command: "postgres -c max_connections=500 -c shared_buffers=200MB"
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usr -d web"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - config.env
    ports:
      - 8000:8080

  front:
    build:
      context: ./frontend
      target: development
    depends_on:
      - app
    ports:
      - 3000:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_TARGET=http://app:8080
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

volumes:
  postgres-data:
